<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QA Manager — Cadastro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
    }

    .logo h1 {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
    }

    .logo p {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      transition: all 0.3s;
      outline: none;
    }

    input::placeholder { color: rgba(255,255,255,0.3); }

    input:focus {
      border-color: #2ecc71;
      background: rgba(46,204,113,0.08);
      box-shadow: 0 0 0 3px rgba(46,204,113,0.15);
    }

    .invite-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 6px;
    }

    .btn-register {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .btn-register:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(46,204,113,0.4);
    }

    .btn-register:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(231,76,60,0.15);
      border: 1px solid rgba(231,76,60,0.4);
      color: #e74c3c;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .success-msg {
      background: rgba(46,204,113,0.15);
      border: 1px solid rgba(46,204,113,0.4);
      color: #2ecc71;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .error-msg.show, .success-msg.show { display: block; }

    .login-link {
      text-align: center;
      margin-top: 24px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
    }

    .login-link a {
      color: #3498db;
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="logo">
      <div class="logo-icon">✍️</div>
      <h1>Criar Conta</h1>
      <p>Cadastro requer código de convite</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Nome completo</label>
        <input type="text" id="name" placeholder="Seu nome completo" required />
      </div>

      <div class="form-group">
        <label for="email">Usuário (login)</label>
        <input type="text" id="email" placeholder="Nome de usuário para login" required />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar senha</label>
        <input type="password" id="confirmPassword" placeholder="Repita a senha" required />
      </div>

      <div class="form-group">
        <label for="inviteCode">Código de convite</label>
        <input type="text" id="inviteCode" placeholder="Digite o código de convite" required />
        <div class="invite-hint">Solicite o código ao administrador do sistema.</div>
      </div>

      <button type="submit" class="btn-register" id="btnRegister">
        Criar conta
      </button>
    </form>

    <div class="login-link">
      Já tem conta? <a href="/login.html">Fazer login</a>
    </div>
  </div>

  <script>
    if (localStorage.getItem('qa_token')) {
      window.location.href = '/';
    }

    const form        = document.getElementById('registerForm');
    const btnRegister = document.getElementById('btnRegister');
    const errorMsg    = document.getElementById('errorMsg');
    const successMsg  = document.getElementById('successMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      successMsg.classList.remove('show');
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.add('show');
      errorMsg.classList.remove('show');
    }

    function hideMessages() {
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const name            = document.getElementById('name').value.trim();
      const email           = document.getElementById('email').value.trim();
      const password        = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const inviteCode      = document.getElementById('inviteCode').value.trim();

      if (!name || !email || !password || !confirmPassword || !inviteCode) {
        showError('Preencha todos os campos.');
        return;
      }

      if (password.length < 6) {
        showError('A senha deve ter no mínimo 6 caracteres.');
        return;
      }

      if (password !== confirmPassword) {
        showError('As senhas não coincidem.');
        return;
      }

      btnRegister.disabled    = true;
      btnRegister.textContent = 'Criando conta...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, inviteCode })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Erro ao criar conta.');
          return;
        }

        showSuccess('Conta criada com sucesso! Redirecionando para o login...');
        form.reset();

        setTimeout(() => {
          window.location.href = '/login.html';
        }, 2000);

      } catch (err) {
        showError('Erro de conexão. Tente novamente.');
      } finally {
        btnRegister.disabled    = false;
        btnRegister.textContent = 'Criar conta';
      }
    });
  </script>
</body>
</html>
